name: Build SalesManager Release APK

on:
  push:
    branches:
      - production
      - develop
    tags:
      - 'salesmanager-v*'   # e.g. salesmanager-v1.0.1 → public release
  workflow_dispatch:        # manual trigger from GitHub UI

# Required for creating GitHub Releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Add google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > salesmanager/google-services.json

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      # ── Version resolution ────────────────────────────────────────
      # Tag  → real version (public release)
      # Push → dev-{short-sha} (for testing only — not shown to users)
      - name: Resolve version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/salesmanager-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/salesmanager-v}"
            IS_RELEASE=true
          else
            # Build from branch (develop / production) — for internal testing
            SHORT_SHA="${GITHUB_SHA::7}"
            BRANCH="${GITHUB_REF#refs/heads/}"
            VERSION="0.0.1"          # low versionCode — never triggers in-app update
            IS_RELEASE=false
          fi

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))

          echo "VERSION_NAME=$VERSION"        >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE"   >> $GITHUB_ENV
          echo "IS_RELEASE=$IS_RELEASE"       >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}"   >> $GITHUB_ENV
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Patch build.gradle.kts
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/"       salesmanager/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION_NAME\"/" salesmanager/build.gradle.kts

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          export PATH="/tmp/gradle/gradle-8.7/bin:$PATH"
          gradle :salesmanager:assembleRelease --stacktrace

      # ── Always upload artifact (download from Actions tab) ────────
      - uses: actions/upload-artifact@v4
        with:
          name: salesmanager-${{ env.BRANCH || 'tag' }}-${{ env.SHORT_SHA }}
          path: salesmanager/build/outputs/apk/release/salesmanager-release.apk
          retention-days: 7

      # ── Public release — only on salesmanager-v* tag ─────────────
      - name: Publish Public Release
        if: env.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "الإصدار ${{ env.VERSION_NAME }}"
          prerelease: false
          body: |
            - تحسينات عامة
          files: salesmanager/build/outputs/apk/release/salesmanager-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
