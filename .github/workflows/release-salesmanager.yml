name: Build SalesManager Release APK

on:
  push:
    branches:
      - production
    tags:
      - 'salesmanager-v*'   # e.g. salesmanager-v1.0.1
  workflow_dispatch:


# ✅ Required for creating GitHub releases
permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Add google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > salesmanager/google-services.json

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      # ── Parse semantic version from tag ───────────────────────────
      # Tag "salesmanager-v1.0.1" → MAJOR=1  MINOR=0  PATCH=1
      # versionCode = MAJOR*10000 + MINOR*100 + PATCH  →  10001
      # versionName = "1.0.1"
      - name: Parse version from tag
        if: startsWith(github.ref, 'refs/tags/salesmanager-v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/salesmanager-v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "VERSION_NAME=$VERSION"       >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE"  >> $GITHUB_ENV
          echo "Tag: salesmanager-v$VERSION → versionCode=$VERSION_CODE"

      - name: Patch build.gradle.kts
        if: startsWith(github.ref, 'refs/tags/salesmanager-v')
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/"   salesmanager/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION_NAME\"/" salesmanager/build.gradle.kts
          echo "Patched → versionCode=$VERSION_CODE  versionName=$VERSION_NAME"

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          export PATH="/tmp/gradle/gradle-8.7/bin:$PATH"
          gradle :salesmanager:assembleRelease --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: salesmanager-apk
          path: salesmanager/build/outputs/apk/release/salesmanager-release.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/salesmanager-v')
        uses: softprops/action-gh-release@v2
        with:
          name: "الإصدار ${{ env.VERSION_NAME }}"
          body: |
            - إصلاح عرض التاريخ في تفاصيل العملية
          files: salesmanager/build/outputs/apk/release/salesmanager-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
