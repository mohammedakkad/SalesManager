name: Build Admin Release APK

on:
  push:
    tags: ['admin-v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Add google-services.json
        run: echo "${{ secrets.ADMIN_GOOGLE_SERVICES_JSON }}" > admin/google-services.json

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > admin/keystore_admin.jks

      - name: Build Admin APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          export PATH="/tmp/gradle/gradle-8.7/bin:$PATH"
          gradle :admin:assembleRelease --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: admin-apk
          path: admin/build/outputs/apk/release/admin-release.apk

      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: admin/build/outputs/apk/release/admin-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
